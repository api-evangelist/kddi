aid: kddi
name: KDDI
description: >-
  KDDI Corporation is a Japanese multinational telecommunications operator
  headquartered in Tokyo, providing mobile, fixed-line, broadband, and
  enterprise ICT services. KDDI markets its consumer mobile services under the
  au brand, alongside UQ mobile and povo, and serves enterprise customers
  globally through KDDI Global and KDDI America. The company operates the
  KDDI Open API for Developers portal exposing inquiry-gated product APIs
  including the au PAY Mini App platform, an XR/MEC low-latency application
  API, a PPM consent management API, and an au mobile Identification Support
  Service for KYC/identity verification. KDDI also runs the au OPEN DEVICE
  DEVELOPER SITE for cellular module device certification, and a KDDI Cloud
  Platform Service knowledge site with developer API references for cloud
  infrastructure. In 2025 KDDI became an equity partner in Aduna, the
  GSMA/Ericsson-backed network API venture aggregating CAMARA-aligned
  carrier APIs (Number Verify, SIM Swap, Quality on Demand, Device Location)
  across global operators. Public OpenAPI specifications are not openly
  published; API access is provided through contact/inquiry workflows after
  partner onboarding.
